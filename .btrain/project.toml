[project]
name = "btrain"

[agents]
reviewer_default = "codex"
writer_default = "claude"
active = ["claude", "codex"]

[lanes]
per_agent = 3
enabled = true
ids = ["a", "b", "c", "d", "e", "f"]

[lanes.a]
handoff_path = ".claude/collab/HANDOFF_A.md"

[lanes.b]
handoff_path = ".claude/collab/HANDOFF_B.md"

[lanes.c]
handoff_path = ".claude/collab/HANDOFF_C.md"

[lanes.d]
handoff_path = ".claude/collab/HANDOFF_D.md"

[lanes.e]
handoff_path = ".claude/collab/HANDOFF_E.md"

[lanes.f]
handoff_path = ".claude/collab/HANDOFF_F.md"

[pr_flow]
enabled = true
base = "main"
required_bots = ["codex", "unblocked"]

[pr_flow.bots.codex]
aliases = ["chatgpt-codex-connector[bot]", "chatgpt-codex-connector"]
request_body = "@codex review"

[pr_flow.bots.unblocked]
aliases = ["unblocked[bot]", "unblocked"]
request_body = "@unblocked review again"
