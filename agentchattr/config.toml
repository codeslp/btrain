[server]
port = 8300
host = "127.0.0.1"
data_dir = "./data"

# Add agents here. Each gets a status pill, @mention routing, and color.
# "cwd" is the working directory for the agent's terminal session.
# "command" is the CLI command (must be on PATH).

[agents.claude]
command = "claude"
cwd = ".."
color = "#da7756"
label = "Claude"

[agents.codex]
command = "codex"
cwd = ".."
color = "#10a37f"
label = "Codex"

[agents.gemini]
command = "gemini"
cwd = ".."
color = "#4285f4"
label = "Gemini"

[agents.kimi]
command = "kimi"
cwd = ".."
color = "#1783ff"
label = "Kimi"

[agents.qwen]
command = "qwen"
cwd = ".."
color = "#8b5cf6"
label = "Qwen"
inject_delay = 1.0

[agents.kilo]
command = "kilo"
cwd = ".."
color = "#f7f677"
label = "Kilo"

[agents.minimax]
type = "api"
base_url = "https://api.minimax.io/v1"
model = "MiniMax-M2.7"
color = "#2fe898"
label = "MiniMax"
api_key_env = "MINIMAX_API_KEY"
temperature = 1.0

[btrain]
# Path to the btrain-managed repo (relative to agentchattr or absolute).
# Used as fallback when [[repos]] is not defined.
repo_path = ".."
# Seconds between btrain status polls.
poll_interval = 5

# --- Multi-repo polling ---
# Each [[repos]] entry defines a btrain-managed repo to monitor.
# When present, these override [btrain].repo_path.

[[repos]]
label = "kepleronto"
path = "/Users/bfaris96/kepleronto"
poll_interval = 5

[[repos]]
label = "cgraph"
path = "/Users/bfaris96/cgraph"
poll_interval = 5

[[repos]]
label = "ai_sales"
path = "/Volumes/zombie/closr/ai_sales"
poll_interval = 5

[[repos]]
label = "btrain"
path = "/Users/bfaris96/btrain"
poll_interval = 5

[routing]
# "none" = only route on explicit @mention. "all" = route to all agents by default.
default = "none"
max_agent_hops = 4

[images]
upload_dir = "./uploads"
max_size_mb = 10

# --- API agents (local models) ---
# Add local model agents in config.local.toml (gitignored).
# Example config.local.toml:
#
#   [agents.qwen]
#   type = "api"
#   base_url = "http://localhost:8189/v1"
#   model = "qwen3-4b"
#   color = "#8b5cf6"
#   label = "Qwen"
#   # api_key_env = "MY_API_KEY"     # optional: env var name for API key
#   # system_prompt = "You are ..."   # optional: custom system prompt
#
# Then run: python wrapper_api.py qwen
